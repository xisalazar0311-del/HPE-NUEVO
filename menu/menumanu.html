  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Rajdhani:wght@500;600;700&display=swap"

  <!-- Tailwind CSS (opcional, pero se usa en el sidebar de HPE) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hpe: {
              base: '#0a0c0f',
              card: '#161b22',
              border: '#1e242e',
              accent: '#00e6b4',
              accent2: '#00cca0',
              text: '#e8edf5',
              muted: '#4a5568'
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            tech: ['Rajdhani', 'sans-serif']
          }
        }
      }
    }
  </script>

  <!-- Custom CSS (HPE theme) -->
  <link rel="stylesheet" href="../css/style_hpe.css"> <!-- Ajusta la ruta seg�n tu estructura -->

  <style>
    /* Ajustes adicionales para que el main content se comporte igual que en hpe.html */
    body {
      overflow-x: hidden;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    @media (max-width: 768px) {
      #app {
        height: auto;
        min-height: 100vh;
        flex-direction: column;
      }
    }

    .main-content-dashboard {
      flex: 1;
      height: 100vh;
      overflow-y: auto;
      background: var(--hpe-dark);
    }

    @media (max-width: 768px) {
      .main-content-dashboard {
        height: auto;
        min-height: 100vh;
        overflow-y: visible;
      }
    }

    /* Mantener las cards del dashboard con su dise�o original, pero adaptadas al tema */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    .card-btn {
      position: relative;
      display: block;
      height: 200px;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      border: 1px solid rgba(0, 212, 255, 0.2);
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }

    .card-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.3) 50%, rgba(0, 0, 0, 0.85) 100%);
      z-index: 1;
      transition: opacity 0.35s ease;
    }

    .card-btn .bg-image {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.5s ease;
    }

    .card-btn .content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1.25rem 1.25rem 1.5rem;
      z-index: 2;
    }

    .card-btn .content h3 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.25rem;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    .card-btn .content span {
      font-size: 0.85rem;
      color: var(--hpe-accent);
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }

    .card-btn:hover {
      transform: translateY(-6px) scale(1.02);
      border-color: var(--hpe-accent);
      box-shadow: 0 12px 40px rgba(0, 210, 200, 0.3);
    }

    .card-btn:hover .bg-image {
      transform: scale(1.08);
    }

    .fa-solid fa-shirt {
      padding: 20px;
    }

    .text-glow-cyan {
      transition: text-shadow 0.3s ease;
    }

    .text-glow-cyan:hover {
      text-shadow:
        0 0 5px #0ff,
        0 0 10px #0ff,
        0 0 20px #0ff,
        0 0 40px #0ff;
    }

    /* Estilo para botones tipo men� (usado en header) */
    .nav-btn {
      display: inline-flex;
      /* Para alinear �cono si se agrega despu�s */
      align-items: center;
      padding: 12px 16px;
      color: #94a3b8;
      /* Mismo color que los items del men� */
      font-weight: 600;
      text-decoration: none;
      /* Quitar subrayado */
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      border: none;
      line-height: 1;
    }

    .nav-btn:hover {
      color: var(--text-primary);
      /* Blanco al hacer hover */
    }

    /* Opcional: si quieres que tenga el mismo efecto en el texto que en el icono del men� */
    .nav-btn:hover {
      text-shadow: 0 0 8px var(--hpe-accent);
    }

    /* Para mantener consistencia con el estado active (si se necesita) */
    .nav-btn.active {
      color: var(--text-primary);
      border-left: 3px solid var(--hpe-accent);
      padding-left: 13px;
      /* Compensar el borde para que no se mueva el texto */
    }

    /* ===== MEJORA DEL MEN� CON EFECTO NEON ===== */
    .nav-list li {
      /* Mant�n los estilos existentes y a�ade transiciones suaves */
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .nav-list li:hover {
      background: rgba(0, 243, 255, 0.25) !important;
      /* M�s opaco */
      color: white !important;
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.6);
      /* Resplandor exterior */
      transform: translateX(5px);
      /* Ligero movimiento */
    }

    .nav-list li:hover i {
      color: #0ff !important;
      transform: scale(1.2);
      text-shadow: 0 0 12px #0ff, 0 0 25px #0ff;
      /* Efecto neon en el icono */
    }

    .nav-list li:hover::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, rgba(0, 243, 255, 0.3) 0%, transparent 70%);
      z-index: -1;
      border-radius: 8px;
    }

    .menu-link {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      color: inherit;
      text-decoration: none;
    }

    /* ===== BOT�N DE CAMBIO DE IDIOMA - translator.js ===== */
    #lang-toggle-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: transparent;
      border: 1.5px solid #00e6b4;
      border-radius: 20px;
      color: #00e6b4;
      font-family: 'Rajdhani', 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.25s ease, color 0.25s ease,
        box-shadow 0.25s ease, transform 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #lang-toggle-btn:hover {
      background: #00e6b4;
      color: #000;
      box-shadow: 0 0 12px rgba(1, 169, 130, 0.55);
      transform: scale(1.05);
    }

    @keyframes lang-pulse {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.08);
      }

      100% {
        transform: scale(1);
      }
    }

    .lang-btn--spinning {
      animation: lang-pulse 0.3s ease;
    }

    /* ===== HAMBURGUESA MOVIL - OVERRIDE TAILWIND ===== */
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        align-items: center !important;
        position: fixed !important;
        top: 16px !important;
        left: 16px !important;
        z-index: 9999 !important;
        width: 44px !important;
        height: 44px !important;
        background: rgba(22, 27, 34, 0.95) !important;
        backdrop-filter: blur(10px) !important;
        border-radius: 12px !important;
        border: 1px solid #1e242e !important;
        cursor: pointer !important;
        pointer-events: all !important;
      }

      .mobile-menu-btn .line {
        display: block !important;
        width: 22px !important;
        height: 2px !important;
        background: #00e6b4 !important;
        margin: 3px 0 !important;
        border-radius: 2px !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
      }

      .mobile-menu-btn.is-active .line:nth-child(1) {
        transform: translateY(8px) rotate(45deg) !important;
      }

      .mobile-menu-btn.is-active .line:nth-child(2) {
        opacity: 0 !important;
      }

      .mobile-menu-btn.is-active .line:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg) !important;
      }

      .menu-overlay {
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        right: 0 !important;
        bottom: 0 !important;
        background: rgba(0, 0, 0, 0.65) !important;
        backdrop-filter: blur(3px) !important;
        z-index: 9998 !important;
        display: none !important;
      }

      .menu-overlay.active {
        display: block !important;
      }

      .sidebar {
        transform: translateX(-100%) !important;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
        z-index: 9999 !important;
      }

      .sidebar.mobile-open {
        transform: translateX(0) !important;
      }
    }
  </style>

  <!-- HPE Theme Loader (Anti-FOUC) -->
  <script>
      (function () {
        try {
          var pref = localStorage.getItem('hpe_theme_pref') || 'System';
          var isLight = pref === 'Light' || (pref === 'System' && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (isLight) document.documentElement.classList.add('light-theme');
        } catch (e) { }
      })();
  </script>
